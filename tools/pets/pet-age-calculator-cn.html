<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>宠物年龄计算器 - WebUtils</title>
    <meta property="og:title" content="宠物年龄计算器 - WebUtils" />
    <meta
      property="og:description"
      content="宠物年龄计算器：在线实用工具，免费在线使用，无需安装"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://tools.realtime-ai.chat/tools/pet/pet-age-calculator.html"
    />
    <meta property="og:site_name" content="WebUtils" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="description" content="将猫狗年龄转换为人类年龄，了解宠物生命阶段" />
    <meta name="keywords" content="宠物 年龄 猫 狗 pet age calculator cat dog" />
    <meta name="author" content="WebUtils" />
    <link rel="canonical" href="https://tools.realtime-ai.chat/tools/pet/pet-age-calculator.html" />

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-deep: #0a0a0f;
        --bg-surface: #12121a;
        --bg-card: #1a1a24;
        --bg-input: #0e0e14;
        --text-primary: #e8e8ed;
        --text-secondary: #8888a0;
        --text-muted: #55556a;
        --border-subtle: #2a2a3a;
        --border-strong: #3a3a4a;
        --accent-cyan: #00f5d4;
        --accent-magenta: #f72585;
        --accent-green: #10b981;
        --accent-red: #f43f5e;
        --accent-yellow: #fbbf24;
        --accent-blue: #4cc9f0;
        --accent-purple: #7b2cbf;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --font-sans:
          "Space Grotesk", -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif;
        --font-mono: "JetBrains Mono", "Courier New", monospace;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      [data-theme="light"] {
        --bg-deep: #fafafa;
        --bg-surface: #fff;
        --bg-card: #fff;
        --bg-input: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666;
        --text-muted: #999;
        --border-subtle: #e5e5e5;
        --border-strong: #d5d5d5;
        --accent-cyan: #00d4b8;
        --accent-magenta: #e63975;
        --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-sans);
        background: var(--color-bg-deep);
        color: var(--color-text-primary);
        min-height: 100vh;
        font-size: 16px;
        line-height: 1.6;
      }
      .bg-grid {
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(77, 159, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(77, 159, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border-subtle);
        background: var(--color-bg-card);
        cursor: pointer;
        font-size: 1.2rem;
        z-index: 100;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--color-accent-cyan);
        transform: scale(1.1);
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        padding: 8px 14px;
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .breadcrumb a {
        color: var(--color-text-secondary);
        text-decoration: none;
      }
      .breadcrumb a:hover {
        color: var(--color-accent-cyan);
      }
      .breadcrumb-separator {
        color: var(--text-muted);
      }
      .breadcrumb-current {
        color: var(--color-text-primary);
        font-weight: 500;
      }
      h1 {
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, var(--color-text-primary), var(--color-accent-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-align: center;
      }
      .subtitle {
        color: var(--color-text-secondary);
        margin-bottom: 2rem;
        text-align: center;
      }
      .card {
        background: var(--color-bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .card-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: var(--color-accent-cyan);
      }
      .pet-selector {
        display: flex;
        gap: 1rem;
        margin-bottom: 1.5rem;
        justify-content: center;
      }
      .pet-btn {
        flex: 1;
        max-width: 200px;
        padding: 1.5rem;
        border: 2px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--color-bg-surface);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        font-size: 1.2rem;
      }
      .pet-btn:hover {
        border-color: var(--color-accent-cyan);
        transform: translateY(-2px);
      }
      .pet-btn.active {
        background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), transparent);
        border-color: var(--color-accent-purple);
        color: var(--color-text-primary);
      }
      .pet-icon {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.5rem;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        background: var(--color-bg-surface);
        color: var(--color-text-primary);
        font-family: var(--font-mono);
        font-size: 1rem;
      }
      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      .result {
        background: linear-gradient(135deg, rgba(157, 78, 221, 0.1), rgba(0, 245, 212, 0.1));
        border: 2px solid var(--color-accent-purple);
        border-radius: var(--radius-lg);
        padding: 2rem;
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .result-value {
        font-family: var(--font-mono);
        font-size: 4rem;
        font-weight: 700;
        color: var(--color-accent-purple);
        margin: 1rem 0;
      }
      .result-label {
        font-size: 1rem;
        color: var(--color-text-secondary);
      }
      .life-stage {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
        margin-top: 1rem;
      }
      .life-stage-title {
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--accent-orange);
      }
      .life-stage-desc {
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--color-text-secondary);
      }
      .comparison {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
      }
      .comparison-card {
        background: var(--color-bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        padding: 1rem;
        text-align: center;
      }
      .comparison-age {
        font-family: var(--font-mono);
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--color-accent-cyan);
        margin: 0.5rem 0;
      }
      .comparison-label {
        font-size: 0.85rem;
        color: var(--text-muted);
      }
      footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        color: var(--text-muted);
        font-size: 0.85rem;
      }
      footer a {
        color: var(--accent-blue);
        text-decoration: none;
      }
      @media (max-width: 600px) {
        .pet-selector {
          flex-direction: column;
        }
        .result-value {
          font-size: 3rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="container">
      <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" aria-label="🌙">
        🌙
      </button>

      <nav class="breadcrumb">
        <a href="../../index.html">首页</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">宠物年龄计算</span>
      </nav>

      <h1>🐾 宠物年龄计算器</h1>
      <p class="subtitle">将宠物年龄转换为人类年龄</p>

      <div class="card">
        <div class="card-title">🐕 选择宠物类型</div>
        <div class="pet-selector">
          <button class="pet-btn active" onclick="selectPet('dog')">
            <div class="pet-icon">🐕</div>
            <div>狗狗</div>
          </button>
          <button class="pet-btn" onclick="selectPet('cat')">
            <div class="pet-icon">🐈</div>
            <div>猫咪</div>
          </button>
        </div>

        <div class="form-group" id="dogSizeGroup">
          <label>狗狗体型</label>
          <select id="dogSize" onchange="calculate()">
            <option value="small">小型犬 (&lt; 9kg)</option>
            <option value="medium" selected>中型犬 (9-22kg)</option>
            <option value="large">大型犬 (&gt; 22kg)</option>
          </select>
        </div>

        <div class="form-group">
          <label id="ageLabel">宠物年龄 (岁)</label>
          <input
            type="number"
            id="petAge"
            value="3"
            min="0"
            max="30"
            step="0.1"
            oninput="calculate()"
            aria-label="数字输入框"
            placeholder="请输入数字输入框"
          />
        </div>
      </div>

      <div class="result">
        <div class="result-label">相当于人类年龄</div>
        <div class="result-value" id="humanAge">28</div>
        <div class="result-label">岁</div>

        <div class="life-stage" id="lifeStage">
          <div class="life-stage-title">生命阶段：青年期</div>
          <div class="life-stage-desc">宠物正处于精力旺盛的黄金时期</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">📊 年龄对照表</div>
        <div class="comparison" id="comparisonTable">
          <!-- Will be rendered by JS -->
        </div>
      </div>

      <div class="card">
        <div class="card-title">💡 宠物年龄知识</div>
        <div class="life-stage-desc">
          <p style="margin-bottom: 1rem"><strong>狗狗年龄计算：</strong></p>
          <ul style="margin-left: 1.5rem; line-height: 2">
            <li>第1年 ≈ 人类15岁</li>
            <li>第2年 ≈ 人类24岁</li>
            <li>之后每年 ≈ 人类4-7岁（取决于体型）</li>
            <li>小型犬寿命通常比大型犬更长</li>
          </ul>
          <p style="margin-top: 1rem; margin-bottom: 1rem"><strong>猫咪年龄计算：</strong></p>
          <ul style="margin-left: 1.5rem; line-height: 2">
            <li>第1年 ≈ 人类15岁</li>
            <li>第2年 ≈ 人类24岁</li>
            <li>之后每年 ≈ 人类4岁</li>
            <li>家猫平均寿命12-18岁</li>
          </ul>
        </div>
      </div>

      <footer>
        <a href="https://github.com/nicexe/html-tools" target="_blank">GitHub</a>
      </footer>
    </div>

    <script>
      let currentPet = "dog";

      function selectPet(pet) {
        currentPet = pet;
        document.querySelectorAll(".pet-btn").forEach((btn) => btn.classList.remove("active"));
        event.target.closest(".pet-btn").classList.add("active");

        // Show/hide dog size selector
        document.getElementById("dogSizeGroup").style.display = pet === "dog" ? "block" : "none";

        calculate();
      }

      function calculate() {
        const petAge = parseFloat(document.getElementById("petAge").value) || 0;
        const dogSize = document.getElementById("dogSize").value;

        let humanAge = 0;

        if (currentPet === "dog") {
          // Dog age calculation
          if (petAge <= 1) {
            humanAge = petAge * 15;
          } else if (petAge <= 2) {
            humanAge = 15 + (petAge - 1) * 9;
          } else {
            let yearlyRate = 4;
            if (dogSize === "small") yearlyRate = 4;
            else if (dogSize === "medium") yearlyRate = 5;
            else yearlyRate = 7;

            humanAge = 24 + (petAge - 2) * yearlyRate;
          }
        } else {
          // Cat age calculation
          if (petAge <= 1) {
            humanAge = petAge * 15;
          } else if (petAge <= 2) {
            humanAge = 15 + (petAge - 1) * 9;
          } else {
            humanAge = 24 + (petAge - 2) * 4;
          }
        }

        document.getElementById("humanAge").textContent = Math.round(humanAge);

        updateLifeStage(humanAge);
        updateComparisonTable();
      }

      function updateLifeStage(humanAge) {
        const stage = document.getElementById("lifeStage");
        let title, desc;

        if (humanAge < 18) {
          title = "幼年期";
          desc = "宠物还在成长发育阶段，需要充足的营养和训练";
        } else if (humanAge < 40) {
          title = "青年期";
          desc = "宠物正处于精力旺盛的黄金时期，活跃好动";
        } else if (humanAge < 60) {
          title = "中年期";
          desc = "宠物开始进入成熟稳重阶段，需要注意健康检查";
        } else if (humanAge < 75) {
          title = "老年期";
          desc = "宠物进入老年，需要更多关爱和医疗照顾";
        } else {
          title = "高龄期";
          desc = "宠物已经高龄，需要特别的照料和舒适的环境";
        }

        stage.innerHTML = `
        <div class="life-stage-title">生命阶段：${title}</div>
        <div class="life-stage-desc">${desc}</div>
      `;
      }

      function updateComparisonTable() {
        const container = document.getElementById("comparisonTable");
        const dogSize = document.getElementById("dogSize").value;

        let html = "";
        for (let age = 1; age <= 15; age++) {
          let humanAge = 0;

          if (currentPet === "dog") {
            if (age <= 1) {
              humanAge = age * 15;
            } else if (age <= 2) {
              humanAge = 15 + (age - 1) * 9;
            } else {
              let yearlyRate = dogSize === "small" ? 4 : dogSize === "medium" ? 5 : 7;
              humanAge = 24 + (age - 2) * yearlyRate;
            }
          } else {
            if (age <= 1) {
              humanAge = age * 15;
            } else if (age <= 2) {
              humanAge = 15 + (age - 1) * 9;
            } else {
              humanAge = 24 + (age - 2) * 4;
            }
          }

          html += `
          <div class="comparison-card">
            <div class="comparison-label">${currentPet === "dog" ? "🐕" : "🐈"} ${age} 岁</div>
            <div class="comparison-age">≈ ${Math.round(humanAge)}</div>
            <div class="comparison-label">人类年龄</div>
          </div>
        `;
        }

        container.innerHTML = html;
      }

      // Initialize
      calculate();

      window.toggleTheme = function () {
        const html = document.documentElement;
        const btn = document.querySelector(".theme-toggle");
        const current = html.getAttribute("data-theme");
        const next = current === "light" ? "dark" : "light";
        html.setAttribute("data-theme", next);
        btn.textContent = next === "light" ? "☀️" : "🌙";
        localStorage.setItem("theme", next);
      };

      (function () {
        const saved = localStorage.getItem("theme");
        if (saved) {
          document.documentElement.setAttribute("data-theme", saved);
          document.querySelector(".theme-toggle").textContent = saved === "light" ? "☀️" : "🌙";
        }
      })();
    </script>
  </body>
</html>
